    - data:
        code: "import json\n\nEXPERT_ORDER = [\n    (\"结构设计\", \"E01\"),\n    (\"\
          舾装工艺\", \"E02\"),\n    (\"质量规范\", \"E03\"),\n    (\"电气系统\", \"E04\"),\n\
          \    (\"轮机系统\", \"E05\"),\n    (\"材料与焊接\", \"E06\")\n]\n\ndef main(llm_output:\
          \ str) -> dict:\n    \"\"\"\n    将 LLM 输出的 routing_table 按固定顺序映射为 E01_weight,\
          \ E01_context 等字段。\n    仅保留 weight > 0 的专家；若未出现或 weight <= 0，则设为 0 和空字符串。\n\
          \    \"\"\"\n    # 初始化输出字典\n    result = {}\n    for _, prefix in EXPERT_ORDER:\n\
          \        result[f\"{prefix}_weight\"] = 0.0\n        result[f\"{prefix}_context\"\
          ] = \"\"\n\n    try:\n        cleaned_output = llm_output.strip()\n    \
          \    if '```json' in cleaned_output or '```' in cleaned_output:\n      \
          \      # 使用正则表达式提取JSON部分\n            json_match = re.search(r'```(?:json)?\\\
          s*\\n*(.*?)\\n*\\s*```', cleaned_output, re.DOTALL)\n            if json_match:\n\
          \                cleaned_output = json_match.group(1).strip()\n        \
          \    else:\n                # 如果正则匹配失败，尝试简单移除markdown标记\n              \
          \  lines = cleaned_output.split('\\n')\n                json_lines = []\n\
          \                in_json_block = False\n                for line in lines:\n\
          \                    stripped = line.strip()\n                    if stripped.startswith('```'):\n\
          \                        in_json_block = not in_json_block\n           \
          \             continue\n                    if in_json_block or (not in_json_block\
          \ and stripped):\n                        if not in_json_block and stripped.startswith('```'):\n\
          \                            continue\n                        json_lines.append(line)\n\
          \                cleaned_output = '\\n'.join(json_lines).strip()\n     \
          \   data = json.loads(cleaned_output.strip())\n        routing_table = data.get(\"\
          routing_table\", [])\n\n        # 构建 role -> (weight, context) 的映射\n   \
          \     role_map = {}\n        for item in routing_table:\n            role\
          \ = str(item.get(\"expert_role\", \"\")).strip()\n            weight = float(item.get(\"\
          weight\", 0))\n            context = str(item.get(\"retrieved_context\"\
          , \"\"))\n            if weight > 0 and role:\n                role_map[role]\
          \ = (weight, context)\n\n        # 按固定顺序填充\n        for role, prefix in\
          \ EXPERT_ORDER:\n            if role in role_map:\n                w, c\
          \ = role_map[role]\n                result[f\"{prefix}_weight\"] = w\n \
          \               result[f\"{prefix}_context\"] = c\n            # 否则保留默认\
          \ 0 和 \"\"\n\n    except Exception:\n        # 解析失败时保持默认值（全0）\n        pass\n\
          \n    return {\"E01_weight\": result[\"E01_weight\"],\n    \"E01_context\"\
          : result[\"E01_context\"],\n    \"E02_weight\": result[\"E02_weight\"],\n\
          \    \"E02_context\": result[\"E02_context\"],\n    \"E03_weight\": result[\"\
          E03_weight\"],\n    \"E03_context\": result[\"E03_context\"],\n    \"E04_weight\"\
          : result[\"E04_weight\"],\n    \"E04_context\": result[\"E04_context\"],\n\
          \    \"E05_weight\": result[\"E05_weight\"],\n    \"E05_context\": result[\"\
          E05_context\"],\n    \"E06_weight\": result[\"E06_weight\"],\n    \"E06_context\"\
          : result[\"E06_context\"]}"

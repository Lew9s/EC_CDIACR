    - data:
        code: "import json\n\ndef safe_parse_consensus(s: str) -> int:\n    \"\"\"\
          安全解析共识评分字符串，失败时返回 0\"\"\"\n    try:\n        data = json.loads(s.strip())\n\
          \        score = data.get(\"consensus_score\", 0)\n        return 1 if score\
          \ == 1 else 0\n    except:\n        return 0\n\ndef main(s01: str, s02:\
          \ str, s03: str, s04: str, s05: str, s06: str, w01: float, w02: float, w03:\
          \ float, w04: float, w05: float, w06: float):\n    weights = [w01,w02,w03,w04,w05,w06]\n\
